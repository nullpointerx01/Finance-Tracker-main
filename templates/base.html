<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>{% block title %}Finance Tracker{% endblock %}</title>
    
    <!-- Bootstrap & Fonts -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;700&display=swap" rel="stylesheet"/>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.2/dist/gsap.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/tsparticles@2.11.1/tsparticles.bundle.min.js"></script>

    <link rel="stylesheet" href="{{ url_for('static', filename='css/bootstrap.min.css') }}">

    <style>
        * { font-family: 'Poppins', sans-serif; }

        body { display: flex; flex-direction: column; min-height: 100vh; margin: 0; overflow-x: hidden; }
        .container { flex: 1; }
        footer { background-color: #f8f9fa; padding: 20px 0; text-align: center; width: 100%; }

        #tsparticles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background: #f5f8fc;
        }

        #loading-screen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255, 255, 255, 0.9);
            display: flex; justify-content: center; align-items: center;
            z-index: 9999;
            opacity: 1;
            transition: opacity 0.5s ease-in-out;
        }

        #loading-screen img {
            width: 80px; height: 80px;
            animation: pulse 1.5s infinite ease-in-out alternate;
        }

        @keyframes pulse {
            from { transform: scale(1); opacity: 0.7; }
            to { transform: scale(1.1); opacity: 1; }
        }

        #loading-screen.hidden {
            opacity: 0;
            pointer-events: none;
        }

        #corner-robot {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 80px;
            z-index: 999;
            opacity: 0;
            cursor: pointer;
            transition: transform 0.3s ease, filter 0.3s ease;
        }

        #corner-robot:hover {
            transform: scale(1.2) rotate(5deg);
            animation: wiggle 0.8s ease-in-out infinite;
            filter: drop-shadow(0 0 10px #00bfff);
        }

        @keyframes wiggle {
            0% { transform: rotate(0deg) scale(1.2); }
            25% { transform: rotate(2deg) scale(1.2); }
            50% { transform: rotate(-2deg) scale(1.2); }
            75% { transform: rotate(2deg) scale(1.2); }
            100% { transform: rotate(0deg) scale(1.2); }
        }

        #chatbot-modal {
            position: fixed;
            bottom: 90px;
            right: 20px;
            width: 300px;
            height: 400px;
            background: white;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.3);
            display: none;
            flex-direction: column;
            overflow: hidden;
            z-index: 1000;
        }

        #chatbot-header {
            background: #007bff;
            color: white;
            padding: 10px;
            text-align: center;
            font-weight: bold;
            position: relative;
        }

        #chatbot-body {
            flex: 1;
            padding: 10px;
            overflow-y: auto;
            font-size: 14px;
        }

        #chatbot-footer {
            display: flex;
            padding: 10px;
            border-top: 1px solid #ccc;
        }

        #chatbot-input {
            flex: 1;
            padding: 5px;
            border: 1px solid #ccc;
            border-radius: 5px;
        }

        #chatbot-send {
            background: #007bff;
            color: white;
            border: none;
            padding: 5px 10px;
            border-radius: 5px;
            margin-left: 5px;
            cursor: pointer;
        }

        #chatbot-close {
            position: absolute;
            top: 5px;
            right: 10px;
            cursor: pointer;
            font-size: 16px;
            color: white;
        }

        #chatbot-body::-webkit-scrollbar {
            width: 6px;
        }

        #chatbot-body::-webkit-scrollbar-thumb {
            background: #007bff;
            border-radius: 3px;
        }

        .glow {
            text-shadow: 0 0 5px #007bff, 0 0 10px #007bff, 0 0 15px #007bff, 0 0 20px #007bff;
            animation: glow-animation 1.5s infinite alternate;
        }

        @keyframes glow-animation {
            from {
                text-shadow: 0 0 5px #007bff, 0 0 10px #007bff, 0 0 15px #007bff, 0 0 20px #007bff;
            }
            to {
                text-shadow: 0 0 10px #007bff, 0 0 20px #007bff, 0 0 30px #007bff, 0 0 40px #007bff;
            }
        }

        /* Navbar hover effects */
        .navbar-nav .nav-link {
            transition: transform 0.3s ease, color 0.3s ease, text-shadow 0.3s ease;
        }

        .navbar-nav .nav-link:hover {
            transform: scale(1.1);
            color: #00bfff !important;
            text-shadow: 0 0 8px rgba(0, 191, 255, 0.7);
        }

        /* Footer roll effect */
        .footer-text {
            position: relative;
            display: inline-block;
            overflow: hidden;
        }

        .footer-text span {
            display: inline-block;
            position: relative;
            transition: transform 0.5s ease;
        }

        .footer-text:hover span {
            transform: translateY(100%);
        }
    </style>
</head>
<body>

<!-- Particle Background -->
<div id="tsparticles"></div>

<!-- Loading Screen -->
<div id="loading-screen">
    <img src="{{ url_for('static', filename='loader.gif') }}" alt="Loading...">
</div>

<!-- Robot Icon -->
<img id="corner-robot" src="{{ url_for('static', filename='robot.gif') }}" alt="Chatbot">

<!-- Chatbot Modal -->
<div id="chatbot-modal">
    <div id="chatbot-header">
        Chatbot <span id="chatbot-close">&times;</span>
    </div>
    <div id="chatbot-body">
        <p id="greeting"></p>
    </div>
    <div id="chatbot-footer">
        <input type="text" id="chatbot-input" placeholder="Type a message...">
        <button id="chatbot-send">Send</button>
    </div>
</div>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container-fluid">
        <a class="navbar-brand" href="#">T₹ACK </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse justify-content-center" id="navbarSupportedContent">
            <ul class="navbar-nav mb-2 mb-lg-0">
                <li class="nav-item me-lg-3"><a class="nav-link" href="{{ url_for('index') }}">Home</a></li>
                <li class="nav-item me-lg-3"><a class="nav-link" href="{{ url_for('transactions') }}">Transactions</a></li>
                <li class="nav-item me-lg-3"><a class="nav-link" href="{{ url_for('statistics') }}">Statistics</a></li>
            </ul>
        </div>
        <div class="d-none d-md-flex me-lg-3">
            <a class="btn btn-outline-light" href="{{ url_for('logout') }}">Logout</a>
        </div>
    </div>
</nav>

<!-- Main Content -->
<div class="container">
    {% block content %}
    <!-- Content goes here -->
    {% endblock %}
</div>

<!-- Footer -->
<footer class="footer">
    <div class="footer-text">
        <span>&copy; 2025 T₹ACK. All rights reserved.</span>
    </div>
</footer>

<script>
    // Load particles background
    tsParticles.load("tsparticles", {
        fullScreen: { enable: false },
        particles: {
            number: { value: 80, density: { enable: true, area: 800 } },
            color: { value: "#00bfff" },
            shape: { type: ["circle", "triangle", "polygon"], polygon: { sides: 6 } },
            opacity: { value: 0.5, random: true },
            size: { value: 5, random: true, animation: { enable: true, speed: 5, minimumValue: 2 } },
            move: {
                enable: true,
                speed: 3,
                direction: "random",
                outModes: { default: "out" }
            },
            links: {
                enable: true,
                distance: 150,
                color: "#00bfff",
                opacity: 0.5,
                width: 1
            },
            tilt: { enable: true, value: 30 },
        },
        interactivity: {
            events: {
                onHover: { enable: true, mode: "repulse" },
                onClick: { enable: true, mode: "push" }
            },
            modes: {
                repulse: { distance: 120 },
                push: { quantity: 6 },
            }
        },
        detectRetina: true
    });

    // Hide loading screen after window load
    window.addEventListener('load', () => {
        document.getElementById('loading-screen').classList.add('hidden');
    });

    // Toggle Chatbot Modal
    const robot = document.getElementById('corner-robot');
    const chatbotModal = document.getElementById('chatbot-modal');
    const chatbotClose = document.getElementById('chatbot-close');
    const chatbotInput = document.getElementById('chatbot-input');
    const chatbotSend = document.getElementById('chatbot-send');

    robot.addEventListener('click', () => {
        chatbotModal.style.display = 'flex';
    });

    chatbotClose.addEventListener('click', () => {
        chatbotModal.style.display = 'none';
    });

    chatbotSend.addEventListener('click', () => {
        const userMessage = chatbotInput.value;
        const messageElement = document.createElement('p');
        messageElement.textContent = `You: ${userMessage}`;
        chatbotModal.querySelector('#chatbot-body').appendChild(messageElement);
        chatbotInput.value = '';
    });

    // Greet user on chatbot load
    document.getElementById('greeting').textContent = 'Hello, how can I help you today?';
</script>

<script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.6/dist/umd/popper.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.min.js"></script>

</body>
</html>
